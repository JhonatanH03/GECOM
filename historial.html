<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GECOM - Historial de Cambios</title>
  <link rel="icon" href="assets/LOGO SHIELD RD.png" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/animate.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/guard.js"></script>
  <script src="js/app-layout.js?v=4"></script>
</head>

<body id="bodyRoot" class="bg-light app-page">

<div id="appLayoutContainer"></div>

<main class="app-main-content">
<div class="container mt-5">

<div class="title-history">
  <div class="mb-3">
    <a href="dashboard.html" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i> Volver al Panel Principal
    </a>
  </div>
  <div class="mb-4">
    <h1 class="mb-0">Historial de Cambios</h1>
    <span></span>
  </div>
</div>

  <!-- Filtro estado -->
  <div class="row mb-3">
    <div class="col-md-4">
      <label class="form-label">Filtrar por estado:</label>
      <select id="filtroEstado" class="form-select">
        <option value="Todos">Todos</option>
        <option value="Pendiente">Pendiente</option>
        <option value="En proceso">En proceso</option>
        <option value="Resuelta">Resuelta</option>
        <option value="Rechazada">Rechazada</option>
      </select>
    </div>
  </div>

  <div id="filtroDenunciaActivo" class="alert alert-info py-2 px-3 d-none d-flex justify-content-between align-items-center">
    <span id="filtroDenunciaTexto" class="small mb-0"></span>
    <button type="button" id="btnLimpiarFiltroDenuncia" class="btn btn-sm btn-outline-secondary">Ver todo</button>
  </div>

  <!-- Feedback -->
  <div id="feedbackHistorial"></div>

  <!-- Tabla -->
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle table-mobile-cards">
      <thead class="gecom-table-head">
        <tr>
          <th>Fecha</th>
          <th>Denuncia</th>
          <th>Estado</th>
          <th>Plazo estimado</th>
          <th>Presupuesto</th>
          <th>Respuesta del Ayuntamiento</th>
        </tr>
      </thead>
      <tbody id="tablaHistorial">
        <tr><td colspan="6" class="text-center text-muted py-4">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Paginación -->
  <nav id="paginacionWrap" style="display:none;">
    <ul class="pagination justify-content-center" id="paginacion"></ul>
  </nav>

</div>
</main>

<script type="module" src="js/historial.js?v=2"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/perfil-menu.js?v=2"></script>

<!-- Footer -->
<div id="footer-container"></div>

<script type="module" src="./js/footer.js"></script>

</body>
</html>
