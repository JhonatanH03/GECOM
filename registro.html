<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-5 shadow">
        <h2 class="mb-4 text-center">Registro de Administrador</h2>

        <div id="alertContainer"></div>

        <div id="errorAlert" style="display:none;" class="alert alert-danger alert-dismissible fade show" role="alert">
          <strong>Error:</strong> <span id="errorMessage"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="mb-3">
          <label class="form-label">Correo</label>
          <input type="email" id="email" class="form-control" placeholder="correo@example.com">
        </div>

        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="Contraseña">
        </div>

        <input type="hidden" id="rol" value="admin">

        <button onclick="registrar()" class="btn btn-primary w-100">Registrar Administrador</button>

        <div class="mt-3 text-center">
          <p class="mb-0">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module" src="js/auth.js"></script>

</body>
</html>
