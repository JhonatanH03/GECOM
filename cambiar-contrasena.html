<!DOCTYPE html>

<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <title>GECOM - Cambiar Contraseña</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body id="bodyRoot" class="bg-light">

<div class="dropdown position-absolute" style="top: 20px; right: 20px; z-index: 1050;">
  <button id="btnPaletaTema" class="btn btn-outline-dark btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Elegir tema">
    🎨
  </button>
  <ul class="dropdown-menu dropdown-menu-end" id="menuTema">
    <li><a class="dropdown-item" href="#" data-tema="claro">Claro</a></li>
    <li><a class="dropdown-item" href="#" data-tema="oscuro">Oscuro</a></li>
    <li><a class="dropdown-item" href="#" data-tema="sistema">Sistema</a></li>
  </ul>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 450px;">

    <h3 class="text-center mb-3">Cambiar Contraseña</h3>
    <p class="text-center text-muted">Por favor, cambia tu contraseña temporal por una contraseña segura</p>

    <div id="alertContainer"></div>

    <div class="mb-3">
      <label>Contraseña Temporal</label>
      <input type="password" id="oldPassword" class="form-control" readonly value="Inicial123">
      <small class="text-muted">Esta es tu contraseña temporal generada.</small>
    </div>

    <div class="mb-3">
      <label>Nueva Contraseña</label>
      <input type="password" id="newPassword" class="form-control">
      <small class="text-muted d-block mt-2">Requisitos de contraseña:</small>
      <small id="reqLength" class="text-danger">✗ Al menos 6 caracteres</small><br>
      <small id="reqUpper" class="text-danger">✗ Una letra mayúscula</small><br>
      <small id="reqLower" class="text-danger">✗ Una letra minúscula</small><br>
      <small id="reqNumber" class="text-danger">✗ Un número</small>
    </div>

    <div class="mb-3">
      <label>Confirmar Nueva Contraseña</label>
      <input type="password" id="confirmPassword" class="form-control">
    </div>

    <div class="d-flex gap-2">
      <button onclick="cambiarContrasena()" class="btn btn-primary w-100" id="btnCambiar">Cambiar Contraseña</button>
      <button onclick="logout()" class="btn btn-secondary w-100" id="btnSalir">Cerrar Sesión</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Funciones para mostrar mensajes
function mostrarExito(mensaje) {
  let alert = document.createElement('div');
  alert.className = 'alert alert-success alert-dismissible fade show';
  alert.role = 'alert';
  alert.innerHTML = `<strong>${mensaje}</strong><button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>`;
  document.getElementById('alertContainer').innerHTML = '';
  document.getElementById('alertContainer').appendChild(alert);
  setTimeout(() => { alert.remove(); }, 3000);
}

function mostrarError(mensaje) {
  let alert = document.createElement('div');
  alert.className = 'alert alert-danger alert-dismissible fade show';
  alert.role = 'alert';
  alert.innerHTML = `<strong>${mensaje}</strong><button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>`;
  document.getElementById('alertContainer').innerHTML = '';
  document.getElementById('alertContainer').appendChild(alert);
  setTimeout(() => { alert.remove(); }, 4000);
}

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCoJ_1CWWVkPQsTTYby8nsUKAQrK1bY26I",
  authDomain: "gecom-a721e.firebaseapp.com",
  projectId: "gecom-a721e",
  storageBucket: "gecom-a721e.firebasestorage.app",
  messagingSenderId: "1058349745158",
  appId: "1:1058349745158:web:924e4b88bcc538598e2f87"
};

const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(app);
const db = firebase.firestore(app);

// Validar que el usuario esté autenticado
window.addEventListener("DOMContentLoaded", async () => {
  const uid = localStorage.getItem("uid");
  const usuario = localStorage.getItem("usuario");
  const primerLogin = localStorage.getItem("primerLogin");

  if (!uid || primerLogin !== "true") {
    window.location.href = "index.html";
    return;
  }

  // Monitorear cambios de contraseña
  document.getElementById("newPassword").addEventListener("input", (e) => {
    const pwd = e.target.value;
    const req = [
      document.getElementById("reqLength"),
      document.getElementById("reqUpper"),
      document.getElementById("reqLower"),
      document.getElementById("reqNumber")
    ];
    
    if (req[0]) req[0].innerHTML = pwd.length >= 6 ? "✓ Al menos 6 caracteres" : "✗ Al menos 6 caracteres";
    if (req[1]) req[1].innerHTML = /[A-Z]/.test(pwd) ? "✓ Una letra mayúscula" : "✗ Una letra mayúscula";
    if (req[2]) req[2].innerHTML = /[a-z]/.test(pwd) ? "✓ Una letra minúscula" : "✗ Una letra minúscula";
    if (req[3]) req[3].innerHTML = /\d/.test(pwd) ? "✓ Un número" : "✗ Un número";
  });
});

// Cambiar contraseña
window.cambiarContrasena = async function () {
  const newPassword = document.getElementById("newPassword").value;
  const confirmPassword = document.getElementById("confirmPassword").value;
  const uid = localStorage.getItem("uid");

  if (!newPassword || !confirmPassword) {
    mostrarError("Debes ingresar la nueva contraseña.");
    return;
  }

  if (newPassword !== confirmPassword) {
    mostrarError("Las contraseñas no coinciden.");
    return;
  }

  if (newPassword.length < 6) {
    mostrarError("La contraseña debe tener al menos 6 caracteres.");
    return;
  }

  if (!/[A-Z]/.test(newPassword)) {
    mostrarError("La contraseña debe contener al menos una letra mayúscula.");
    return;
  }

  if (!/[a-z]/.test(newPassword)) {
    mostrarError("La contraseña debe contener al menos una letra minúscula.");
    return;
  }

  if (!/\d/.test(newPassword)) {
    mostrarError("La contraseña debe contener al menos un número.");
    return;
  }

  try {
    const user = auth.currentUser;
    if (!user) {
      mostrarError("Error: usuario no autenticado.");
      return;
    }

    // Cambiar contraseña en Firebase Auth
    await user.updatePassword(newPassword);

    // Marcar primerLogin como false en Firestore
    const colecciones = ["Administradores", "Ayuntamientos", "JuntasDeVecinos"];
    let actualizado = false;

    for (const col of colecciones) {
      const docSnap = await db.collection(col).doc(uid).get();
      if (docSnap.exists) {
        await db.collection(col).doc(uid).update({
          primerLogin: false
        });
        actualizado = true;
        break;
      }
    }

    if (!actualizado) {
      mostrarError("Error al actualizar el perfil.");
      return;
    }

    mostrarExito("Contraseña cambiada exitosamente. Redirigiendo al dashboard...");
    localStorage.setItem("primerLogin", "false");
    
    setTimeout(() => {
      window.location.href = "dashboard.html?v=3";
    }, 2000);

  } catch (error) {
    console.error("Error al cambiar contraseña:", error);
    let mensaje = "Error al cambiar contraseña";
    if (error.code === "auth/weak-password") {
      mensaje = "La contraseña es muy débil";
    } else if (error.code === "auth/requires-recent-login") {
      mensaje = "Debes iniciar sesión nuevamente para cambiar tu contraseña";
    }
    mostrarError(mensaje);
  }
};

// Cerrar sesión
window.logout = function () {
  localStorage.removeItem("uid");
  localStorage.removeItem("rol");
  localStorage.removeItem("usuario");
  localStorage.removeItem("primerLogin");
  window.location.href = "index.html";
};

// Permitir cambiar contraseña con ENTER desde el campo de confirmación
document.addEventListener("DOMContentLoaded", function () {
  const confirmInput = document.getElementById("confirmPassword");
  if (confirmInput) {
    confirmInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        cambiarContrasena();
      }
    });
  }
});
</script>

</body>
</html>
