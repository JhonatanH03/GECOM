<header class="app-header">
  <div class="app-header-left">
    <div class="app-brand">

      <span class="app-brand-text">GECOM</span>
    </div>
  </div>

  <nav class="app-breadcrumbs d-none d-md-flex">

    <span class="breadcrumb-current" id="breadcrumbCurrent">Página</span>

  <div class="app-header-right">
    <div class="profile-menu" id="perfilMenuWrap">
      <button id="perfilAvatarBtn" class="pm-avatar-btn" aria-label="Menú de usuario" title="Usuario" aria-expanded="false">

      <div id="perfilDropdown" class="pm-dropdown" style="display: none;">
        <div class="pm-dropdown-header">
          <div class="pm-avatar-lg"><span id="profileInitialLg">U</span></div>
          <div class="pm-user-info">
            <div class="pm-username" id="profileName">Usuario</div>
            <div class="pm-rol" id="profileRole">Administrador</div>
          </div>
        </div>

        <div class="pm-divider"></div>

        <a class="pm-item" href="cambiar-contrasena.html" id="pmItemPerfil">
          <i class="bi bi-person-circle"></i>
          <span data-pm-i18n="perfil">Perfil</span>
        </a>

        <div class="pm-item-sub" id="pmTemaWrap">
          <div class="pm-item-sub-trigger">
            <i class="bi bi-circle-half"></i>
            <span data-pm-i18n="diseno">Diseño</span>
            <i class="bi bi-chevron-right pm-chevron"></i>
          </div>
          <div class="pm-submenu" id="pmTemaSubmenu">
            <button class="pm-sub-opt" data-tema="claro">

            <button class="pm-sub-opt" data-tema="sistema">
              <i class="bi bi-display"></i> <span data-pm-i18n="sistema">Sistema</span>
            </button>
            <button class="pm-sub-opt" data-tema="oscuro">
              <i class="bi bi-moon"></i> <span data-pm-i18n="oscuro">Oscuro</span>
            </button>
          </div>
        </div>

        <div class="pm-item-sub" id="pmLangWrap">
          <div class="pm-item-sub-trigger">
            <i class="bi bi-translate"></i>
            <span data-pm-i18n="idioma">Idioma</span>
            <i class="bi bi-chevron-right pm-chevron"></i>
          </div>
          <div class="pm-submenu" id="pmLangSubmenu">
            <button class="pm-sub-opt" data-lang="es">
              <i class="bi bi-chat-text"></i> Español
            </button>
            <button class="pm-sub-opt" data-lang="en">
              <i class="bi bi-chat-text"></i> English
            </button>
          </div>
        </div>

        <div class="pm-divider"></div>
        <a class="pm-item pm-item-logout" href="#" id="btnCerrarSesion">
          <i class="bi bi-box-arrow-right"></i>
          <span data-pm-i18n="cerrarSesion">Cerrar Sesión</span>
        </a>
      </div>
    </div>
  </div>
