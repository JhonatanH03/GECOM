<!DOCTYPE html>

<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GECOM - Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body id="bodyRoot" class="bg-light app-page">

<div class="dropdown position-absolute theme-picker" style="top: 20px; right: 20px; z-index: 1050;">
  <button id="btnPaletaTema" class="btn btn-outline-dark btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Elegir tema">
    🎨
  </button>
  <ul class="dropdown-menu dropdown-menu-end" id="menuTema">
    <li><a class="dropdown-item" href="#" data-tema="claro">☀️ Claro</a></li>
    <li><a class="dropdown-item" href="#" data-tema="oscuro">🌙 Oscuro</a></li>
    <li><a class="dropdown-item" href="#" data-tema="sistema">💻 Sistema</a></li>
  </ul>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100 auth-shell">
  <div class="card p-4 shadow auth-card" style="width: min(100%, 380px);">



<h3 class="text-center mb-3">GECOM</h3>
<p class="text-center text-muted">Iniciar sesión</p>


<div class="mb-3">
  <label class="form-label">Usuario</label>
  <input type="text" id="usuario" class="form-control" placeholder="nombre de usuario" autocomplete="username">
</div>

<div class="mb-3">
  <label class="form-label">Contraseña</label>
  <input type="password" id="password" class="form-control" autocomplete="current-password">
</div>



<div class="d-grid gap-2">
  <button onclick="login()" class="btn btn-primary w-100" id="btnLogin">Ingresar</button>
  <button onclick="mostrarRegistro()" class="btn btn-success w-100" id="btnRegistrar" style="display:none">Registrar usuario</button>


</div>

<!-- Modal de registro solo para admins -->
<div class="modal fade" id="modalRegistro" tabindex="-1" aria-labelledby="modalRegistroLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalRegistroLabel">Registrar usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label>Usuario</label>
          <input type="text" id="reg_usuario" class="form-control">
        </div>
        <div class="mb-3">
          <label>Correo</label>
          <input type="email" id="reg_email" class="form-control">
        </div>
        <div class="mb-3">
          <label>Contraseña</label>
          <input type="password" id="reg_password" class="form-control">
        </div>
        <div class="mb-3">
          <label>Rol</label>
          <select id="reg_rol" class="form-control" onchange="mostrarCamposPorRolRegistro()">
            <option value="junta">Junta de Vecinos</option>
            <option value="ayuntamiento">Ayuntamiento</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <div id="reg_camposJunta" style="display:none">
          <div class="mb-3">
            <label>Nombre de la Junta</label>
            <input type="text" id="reg_nombreJunta" class="form-control">
          </div>
          <div class="mb-3">
            <label>Comunidad</label>
            <input type="text" id="reg_comunidad" class="form-control">
          </div>
          <div class="mb-3">
            <label>Teléfono</label>
            <input type="text" id="reg_telefonoJunta" class="form-control">
          </div>
        </div>
        <div id="reg_camposAyuntamiento" style="display:none">
          <div class="mb-3">
            <label>Nombre del Ayuntamiento</label>
            <input type="text" id="reg_nombreAyuntamiento" class="form-control">
          </div>
          <div class="mb-3">
            <label>Teléfono</label>
            <input type="text" id="reg_telefonoAyuntamiento" class="form-control">
          </div>
          <div class="mb-3">
            <label>Dirección</label>
            <input type="text" id="reg_direccionAyuntamiento" class="form-control">
          </div>
          <div class="mb-3">
            <label>Provincia</label>
            <select id="reg_provinciaAyuntamiento" class="form-control" onchange="actualizarMunicipiosAyuntamiento()"></select>
          </div>
          <div class="mb-3">
            <label>Municipio</label>
            <select id="reg_municipioAyuntamiento" class="form-control"></select>
          </div>
        </div>
        <div id="reg_camposAdmin" style="display:none">
          <div class="mb-3">
            <label>Nombre del Administrador</label>
            <input type="text" id="reg_nombreAdmin" class="form-control">
          </div>
          <div class="mb-3">
            <label>Teléfono</label>
            <input type="text" id="reg_telefonoAdmin" class="form-control">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-success" onclick="registrarDesdeAdmin()">Registrar</button>
      </div>
    </div>
  </div>
</div>
<script>
// Provincias y municipios para el registro de ayuntamientos
let provinciasData = [];
fetch('js/provincias.json')
  .then(res => res.json())
  .then(data => {
    provinciasData = data;
    const provinciaSelect = document.getElementById('reg_provinciaAyuntamiento');
    provinciaSelect.innerHTML = '<option value="">Seleccione provincia</option>' +
      data.map(p => `<option value="${p.nombre}">${p.nombre}</option>`).join('');
    provinciaSelect.addEventListener('change', actualizarMunicipiosAyuntamiento);
  });

function actualizarMunicipiosAyuntamiento() {
  const provincia = document.getElementById('reg_provinciaAyuntamiento').value;
  const municipioSelect = document.getElementById('reg_municipioAyuntamiento');
  municipioSelect.innerHTML = '<option value="">Seleccione municipio</option>';
  if (!provincia) return;
  const prov = provinciasData.find(p => p.nombre === provincia);
  if (prov && prov.municipios) {
    municipioSelect.innerHTML += prov.municipios.map(m => `<option value="${m}">${m}</option>`).join('');
  }
}

// Mostrar campos por rol en el modal de registro
function mostrarCamposPorRolRegistro() {
  const rol = document.getElementById('reg_rol').value;
  document.getElementById('reg_camposJunta').style.display = rol === 'junta' ? 'block' : 'none';
  document.getElementById('reg_camposAyuntamiento').style.display = rol === 'ayuntamiento' ? 'block' : 'none';
  document.getElementById('reg_camposAdmin').style.display = rol === 'admin' ? 'block' : 'none';
}

// Mostrar modal de registro solo si es admin
window.mostrarRegistro = function() {
  const modal = new bootstrap.Modal(document.getElementById('modalRegistro'));
  modal.show();
}
</script>



<!-- Mensaje de Error -->
<div id="errorAlert" class="alert alert-danger alert-dismissible fade show mt-3" role="alert" style="display: none;">
  <div id="errorMessage"></div>
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

  </div>
</div>

<!-- JS -->
<script src="js/auth.js?v=5"></script>
<script src="js/tema.js"></script>
<script>
initThemeSelector();
</script>





<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
