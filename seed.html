<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seed Denuncias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/guard.js"></script>
</head>
<body id="bodyRoot" class="bg-light app-page">
<div class="container mt-5">
  <div class="card p-4 shadow" style="max-width:500px;margin:auto">
    <h4>Insertar 25 denuncias de prueba</h4>
    <p class="text-muted small">Solo úsalo en desarrollo. Las denuncias se crearán con tu UID y municipio del perfil.</p>
    <div id="log" class="mb-3" style="max-height:300px;overflow-y:auto;font-size:0.8rem;background:#f8f9fa;padding:10px;border-radius:6px;"></div>
    <button id="btnSeed" class="btn btn-warning w-100">Crear 25 denuncias de prueba</button>
    <a href="dashboard.html" class="btn btn-secondary w-100 mt-2">Volver al Dashboard</a>
  </div>
</div>

<script src="js/tema.js"></script>
<script>
  initThemeSelector();
</script>
<script type="module">
import app from "./js/firebase.js";
import {
  getFirestore, collection, addDoc, Timestamp, getDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
  getAuth
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const db = getFirestore(app);
const auth = getAuth(app);
const logEl = document.getElementById("log");

function log(msg) {
  logEl.innerHTML += `<div>${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}

const tipos = ["Infraestructura", "Salud", "Seguridad", "Medio Ambiente", "Servicios Públicos"];
const estados = ["Pendiente", "En proceso", "Resuelta", "Rechazada", "Pendiente"];
const comunidades = ["Comunidad Norte", "Comunidad Sur", "Barrio Central", "Residencial Este", "Sector Oeste"];

document.getElementById("btnSeed").addEventListener("click", async () => {
  const btn = document.getElementById("btnSeed");
  btn.disabled = true;
  btn.textContent = "Creando...";
  logEl.innerHTML = "";

  const user = auth.currentUser;
  if (!user) {
    log("❌ No hay sesión activa. Inicia sesión primero.");
    btn.disabled = false;
    return;
  }

  const uid = user.uid;
  const rol = localStorage.getItem("rol");

  // Obtener municipio del perfil
  let municipio = "Tamboril";
  let provincia = "Santiago";
  let comunidad = "Comunidad de Prueba";

  const colecciones = rol === "junta"
    ? ["JuntasDeVecinos"]
    : rol === "ayuntamiento"
    ? ["Ayuntamientos"]
    : ["Administradores"];

  for (const col of colecciones) {
    const snap = await getDoc(doc(db, col, uid));
    if (snap.exists()) {
      const data = snap.data();
      municipio = data.municipio || municipio;
      provincia = data.provincia || provincia;
      comunidad = data.comunidad || data.nombreJunta || data.institucion || comunidad;
      break;
    }
  }

  log(`📍 Municipio: ${municipio} | Provincia: ${provincia}`);

  for (let i = 1; i <= 25; i++) {
    const diasAtras = Math.floor(Math.random() * 90);
    const fecha = new Date();
    fecha.setDate(fecha.getDate() - diasAtras);

    const denuncia = {
      titulo: `Denuncia de prueba #${i}`,
      tipo: tipos[i % tipos.length],
      descripcion: `Descripción de la denuncia de prueba número ${i}. Generada para verificar paginación del sistema GECOM.`,
      provincia,
      municipio,
      sector: comunidades[i % comunidades.length],
      comunidad,
      estado: estados[i % estados.length],
      fecha: Timestamp.fromDate(fecha),
      fecha_incidente: Timestamp.fromDate(fecha),
      evidencia: "",
      uid,
      rol_creador: "junta",
      junta_id: uid,
    };

    try {
      await addDoc(collection(db, "denuncias"), denuncia);
      log(`✅ Denuncia #${i} creada — ${denuncia.tipo} / ${denuncia.estado}`);
    } catch (e) {
      log(`❌ Error en #${i}: ${e.message}`);
    }
  }

  log("<strong>🎉 Proceso completado.</strong>");
  btn.textContent = "✓ Completado";
});
</script>

<!-- Footer -->
<div id="footer-container"></div>

<script type="module" src="./js/footer.js"></script>

</body>
</html>
