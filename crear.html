<!DOCTYPE html>

<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear Denuncia</title>
  <link rel="icon" href="assets/LOGO GECOM PNG.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/animate.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/guard.js"></script>
</head>

<body id="bodyRoot" class="bg-light app-page">

<div class="container mt-5">

  <div class="mb-3 d-flex justify-content-between align-items-center">
    <a href="dashboard.html" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i> Volver al Dashboard
    </a>
    <div class="dropdown">
      <button id="btnPaletaTema" class="btn btn-outline-dark btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Elegir tema">
        🎨
      </button>
      <ul class="dropdown-menu dropdown-menu-end" id="menuTema">
        <li><a class="dropdown-item" href="#" data-tema="claro">☀️ Claro</a></li>
        <li><a class="dropdown-item" href="#" data-tema="oscuro">🌙 Oscuro</a></li>
        <li><a class="dropdown-item" href="#" data-tema="sistema">💻 Sistema</a></li>
      </ul>
    </div>
  </div>

  <div class="card p-4 shadow">
    <h3>Registrar Denuncia</h3>

    <form id="formDenuncia" class="mt-4">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label fw-bold">Título</label>
          <input type="text" id="titulo" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Tipo de Denuncia</label>
          <select id="tipo" class="form-select" required>
            <option value="" selected>Seleccionar tipo</option>
            <option value="Infraestructura">Infraestructura</option>
            <option value="Salud">Salud</option>
            <option value="Seguridad">Seguridad</option>
            <option value="Medio Ambiente">Medio Ambiente</option>
            <option value="Servicios Públicos">Servicios Públicos</option>
            <option value="Otro">Otro</option>
          </select>
          <input type="text" id="tipo_otro" class="form-control mt-2 d-none" placeholder="Especifica el tipo de denuncia" maxlength="100">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold">Descripción</label>
        <textarea id="descripcion" class="form-control" rows="4" required></textarea>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <label class="form-label fw-bold">Provincia</label>
          <select class="form-select" id="provincia" required>
            <option value="" selected>Seleccionar provincia</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Municipio</label>
          <select class="form-select" id="municipio" required>
            <option value="" selected>Seleccionar municipio</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Comunidad</label>
          <input type="text" id="sector" class="form-control" readonly required>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label fw-bold">Fecha del Incidente</label>
          <input type="date" id="fecha_incidente" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Evidencia (Imagen)</label>
          <input type="file" id="evidencia" class="form-control" accept="image/*">
          <div id="evidenciaPreviewWrap" class="mt-3 d-none">
            <p class="small text-muted mb-2">Vista previa de evidencia:</p>
            <img
              id="evidenciaPreviewImg"
              src=""
              alt="Vista previa de evidencia"
              class="img-fluid rounded border"
              style="max-height: 220px; object-fit: contain;"
            >
            <div class="mt-2">
              <button type="button" id="btnQuitarEvidencia" class="btn btn-sm btn-outline-danger">
                Quitar imagen
              </button>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-success btn-lg w-100 mt-3">
        Guardar Denuncia
      </button>
    </form>

    <p id="msg" class="mt-3"></p>

  </div>
</div>

<script type="module" src="js/denuncias.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/perfil-menu.js"></script>
<script src="js/tema.js"></script>
<script>
  initThemeSelector();
</script>
<script>
  document.getElementById("tipo").addEventListener("change", function () {
    const tipoOtro = document.getElementById("tipo_otro");
    if (this.value === "Otro") {
      tipoOtro.classList.remove("d-none");
      tipoOtro.required = true;
    } else {
      tipoOtro.classList.add("d-none");
      tipoOtro.required = false;
      tipoOtro.value = "";
    }
  });
</script>

</body>
</html>
