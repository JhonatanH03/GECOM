<!DOCTYPE html>

<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crear Denuncia - GECOM</title>
  <link rel="icon" href="assets/LOGO SHIELD RD.png" type="image/png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/animate.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/guard.js"></script>
  <script src="js/app-layout.js?v=4"></script>
</head>

<body id="bodyRoot" class="app-page">

<!-- Header + Sidebar Include -->
<div id="appLayoutContainer"></div>

<!-- Main Content -->
<main class="app-main-content">
  <div class="container" style="max-width: 900px;">
    <!-- Page Header -->
    <div style="padding: 2rem 0 1rem;">
      <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--gecom-text); margin: 0 0 0.5rem;">
        <i class="bi bi-plus-circle" style="color: #0d6efd; margin-right: 0.5rem;"></i> Registrar Denuncia
      </h1>
      <p style="color: var(--gecom-subtext); margin: 0;">Completa el formulario con los detalles de tu denuncia</p>
    </div>

    <!-- Form Card -->
    <div class="card" style="margin-bottom: 2rem;">
      <div class="card-body">
        <form id="formDenuncia">
          <!-- Información Básica -->
          <div style="margin-bottom: 2rem;">
            <h5 style="font-size: 1rem; font-weight: 700; color: var(--gecom-text); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
              <i class="bi bi-file-text" style="color: #0d6efd;"></i> Información Básica
            </h5>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Título de la Denuncia</label>
                <input type="text" id="titulo" class="form-control" placeholder="Ej: Bache en la calle principal" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Tipo de Denuncia</label>
                <select id="tipo" class="form-select" required>
                  <option value="" selected disabled>Selecciona el tipo</option>
                  <option value="Infraestructura">🏗️ Infraestructura</option>
                  <option value="Salud">🏥 Salud</option>
                  <option value="Seguridad">🚨 Seguridad</option>
                  <option value="Medio Ambiente">🌳 Medio Ambiente</option>
                  <option value="Servicios Públicos">💡 Servicios Públicos</option>
                  <option value="Otro">📋 Otro</option>
                </select>
              </div>
            </div>

            <div class="row g-3 mt-2">
              <div class="col-12">
                <input type="text" id="tipo_otro" class="form-control d-none" placeholder="Especifica el tipo de denuncia" maxlength="100">
              </div>
            </div>
          </div>

          <!-- Descripción Detallada -->
          <div style="margin-bottom: 2rem; padding-top: 2rem; border-top: 1px solid var(--gecom-stroke);">
            <h5 style="font-size: 1rem; font-weight: 700; color: var(--gecom-text); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
              <i class="bi bi-chat-left-text" style="color: #0d6efd;"></i> Descripción Detallada
            </h5>

            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">¿Qué sucede? (Describe el problema)</label>
                <textarea id="descripcion" class="form-control" rows="5" placeholder="Proporciona una descripción clara y detallada del problema..." required style="resize: vertical;"></textarea>
              </div>
            </div>
          </div>

          <!-- Ubicación -->
          <div style="margin-bottom: 2rem; padding-top: 2rem; border-top: 1px solid var(--gecom-stroke);">
            <h5 style="font-size: 1rem; font-weight: 700; color: var(--gecom-text); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
              <i class="bi bi-geo-alt" style="color: #0d6efd;"></i> Ubicación
            </h5>

            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Provincia</label>
                <select class="form-select" id="provincia" required>
                  <option value="" selected>Selecciona la provincia</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Municipio</label>
                <select class="form-select" id="municipio" required>
                  <option value="" selected>Selecciona el municipio</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Comunidad/Sector</label>
                <input type="text" id="sector" class="form-control" readonly placeholder="Se completará automáticamente" required>
              </div>
            </div>
          </div>

          <!-- Detalles Adicionales -->
          <div style="margin-bottom: 2rem; padding-top: 2rem; border-top: 1px solid var(--gecom-stroke);">
            <h5 style="font-size: 1rem; font-weight: 700; color: var(--gecom-text); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
              <i class="bi bi-camera" style="color: #0d6efd;"></i> Detalles Adicionales
            </h5>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Fecha del Incidente</label>
                <input type="date" id="fecha_incidente" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">Evidencia (Imagen)</label>
                <input type="file" id="evidencia" class="form-control" accept="image/*" multiple>
              </div>
            </div>

            <!-- Image Preview -->
            <div id="evidenciaPreviewWrap" class="mt-3 d-none">
              <div style="border: 1px solid var(--gecom-stroke); border-radius: 10px; padding: 1rem; background: color-mix(in srgb, var(--gecom-surface) 92%, transparent); text-align: center;">
                <p style="color: var(--gecom-subtext); font-size: 0.9rem; margin-bottom: 0.75rem;">📷 Vista previa de las imagenes</p>
                <div id="evidenciaPreviewList" class="d-flex flex-wrap gap-2 justify-content-center"></div>
                <div style="margin-top: 0.75rem;">
                  <button type="button" id="btnQuitarEvidencia" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-trash"></i> Quitar imagenes
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div style="padding-top: 2rem; border-top: 1px solid var(--gecom-stroke); display: flex; gap: 1rem;">
            <a href="dashboard.html" class="btn btn-secondary flex-grow-1">
              <i class="bi bi-x-lg"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-primary flex-grow-1" style="min-height: 48px;">
              <i class="bi bi-check-circle"></i> Registrar Denuncia
            </button>
          </div>
        </form>

        <!-- Feedback Message -->
        <div id="msg" style="margin-top: 1.5rem;"></div>
      </div>
    </div>

  </div>
</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/denuncias.js"></script>
<script src="js/gecom-confirm.js"></script>
<script src="js/i18n.js"></script>
<script src="js/tema.js"></script>
<script>
  initThemeSelector();
</script>
<script>
  document.getElementById("tipo").addEventListener("change", function () {
    const tipoOtro = document.getElementById("tipo_otro");
    if (this.value === "Otro") {
      tipoOtro.classList.remove("d-none");
      tipoOtro.required = true;
    } else {
      tipoOtro.classList.add("d-none");
      tipoOtro.required = false;
      tipoOtro.value = "";
    }
  });
</script>

<!-- Footer -->
<div id="footer-container"></div>
<script type="module" src="./js/footer.js"></script>

</body>
</html>
