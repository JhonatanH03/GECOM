<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estadísticas - GECOM</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

  <h2 class="text-center mb-4">Estadísticas de Denuncias</h2>

  <!-- 🔢 KPIs -->
  <div class="row text-center mb-4">

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>Pendientes</h6>
        <h3 id="pendiente">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>En proceso</h6>
        <h3 id="proceso">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>Resueltas</h6>
        <h3 id="resuelta">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>Rechazadas</h6>
        <h3 id="rechazada">0</h3>
      </div>
    </div>

  </div>

  <!-- 📊 GRÁFICOS -->
  <div class="row">

    <div class="col-md-6">
      <div class="card p-4 shadow">
        <h5 class="text-center">Gráfico de Barras</h5>
        <canvas id="graficoBarras"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-4 shadow">
        <h5 class="text-center">Gráfico Circular</h5>
        <canvas id="graficoPastel"></canvas>
      </div>
    </div>

  </div>

</div>

<script type="module" src="js/estadisticas.js"></script>

</body>
</html>
