<!DOCTYPE html>
<html lang="es" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Estadísticas - GECOM</title>
  <link rel="icon" href="assets/LOGO SHIELD RD.png" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/animate.min.css">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/app-layout.js?v=4"></script>
</head>

<body id="bodyRoot" class="bg-light app-page">

<div id="appLayoutContainer"></div>

<main class="app-main-content">
<div class="container mt-5">

  <div class="mb-3">
    <a href="dashboard.html" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i> Volver al Panel Principal
    </a>
  </div>

  <h2 class="text-center mb-4">Estadísticas de Denuncias</h2>

  <!-- � FILTROS -->
  <!-- FILTROS MEJORADOS -->
  <div class="card p-4 shadow mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0"><i class="bi bi-funnel-fill me-2"></i> Filtros Avanzados</h5>
      <div>
        <span id="filtrosActivos" class="badge bg-info me-2" style="display: none;">
          <i class="bi bi-check-circle me-1"></i><span id="conteoFiltros">0</span> filtros activos
        </span>
        <button id="limpiarFiltros" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-x-circle me-1"></i> Limpiar todos
        </button>
      </div>
    </div>

    <!-- Filtros activos mostrados como chips -->
    <div id="filtrosActivosChips" class="mb-3" style="display: none;">
      <!-- Los chips se generan dinámicamente -->
    </div>

    <!-- Accordion con grupos de filtros -->
    <div class="accordion" id="accordionFiltros">
      
      <!-- Grupo 1: Fechas -->
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseDate" aria-expanded="false">
            <i class="bi bi-calendar-event me-2 text-primary"></i> Período de tiempo
          </button>
        </h2>
        <div id="collapseDate" class="accordion-collapse collapse" data-bs-parent="#accordionFiltros">
          <div class="accordion-body">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Presets:</label>
                <div id="presetsDate" class="d-grid gap-2">
                  <button type="button" class="btn btn-sm btn-outline-primary preset-btn" data-preset="hoy">Hoy</button>
                  <button type="button" class="btn btn-sm btn-outline-primary preset-btn" data-preset="semana">Esta semana</button>
                  <button type="button" class="btn btn-sm btn-outline-primary preset-btn" data-preset="mes">Este mes</button>
                  <button type="button" class="btn btn-sm btn-outline-primary preset-btn" data-preset="30dias">Últimos 30 días</button>
                </div>
              </div>
              <div class="col-md-3">
                <label for="fechaDesde" class="form-label">Desde:</label>
                <input type="date" id="fechaDesde" class="form-control form-control-sm filtro-tiempo-real">
              </div>
              <div class="col-md-3">
                <label for="fechaHasta" class="form-label">Hasta:</label>
                <input type="date" id="fechaHasta" class="form-control form-control-sm filtro-tiempo-real">
              </div>
              <div class="col-md-3 d-flex align-items-end">
                <button id="limpiarFechas" class="btn btn-sm btn-outline-danger w-100">
                  <i class="bi bi-x me-1"></i> Limpiar fechas
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Grupo 2: Ubicación -->
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseLocation" aria-expanded="false">
            <i class="bi bi-geo-alt me-2 text-success"></i> Ubicación
          </button>
        </h2>
        <div id="collapseLocation" class="accordion-collapse collapse" data-bs-parent="#accordionFiltros">
          <div class="accordion-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="provinciaFiltro" class="form-label">Provincia:</label>
                <select id="provinciaFiltro" class="form-select form-select-sm filtro-tiempo-real">
                  <option value="">Todas</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="municipioFiltro" class="form-label">Municipio:</label>
                <select id="municipioFiltro" class="form-select form-select-sm filtro-tiempo-real">
                  <option value="">Todos</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Grupo 3: Estado y Usuario -->
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseStatus" aria-expanded="false">
            <i class="bi bi-tags me-2 text-warning"></i> Estado y Usuario
          </button>
        </h2>
        <div id="collapseStatus" class="accordion-collapse collapse" data-bs-parent="#accordionFiltros">
          <div class="accordion-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="estadoFiltro" class="form-label">Estado:</label>
                <select id="estadoFiltro" class="form-select form-select-sm filtro-tiempo-real">
                  <option value="">Todos</option>
                  <option value="Pendiente">Pendiente</option>
                  <option value="En proceso">En proceso</option>
                  <option value="Resuelta">Resuelta</option>
                  <option value="Rechazada">Rechazada</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="usuarioFiltro" class="form-label">Junta / Usuario:</label>
                <select id="usuarioFiltro" class="form-select form-select-sm filtro-tiempo-real">
                  <option value="">Todos</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 📊 Gráfico por municipio -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card p-4 shadow" style="min-height:340px;">
        <h5 class="text-center mb-3"><i class="bi bi-geo-alt-fill text-info"></i> Denuncias por Municipio</h5>
        <canvas id="graficoMunicipios" height="180" style="max-height:320px;"></canvas>
      </div>
    </div>
  </div>

  <!-- �🔢 KPIs -->
  <div class="row text-center mb-4">

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>Pendientes</h6>
        <h3 id="pendiente">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>En proceso</h6>
        <h3 id="proceso">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>Resueltas</h6>
        <h3 id="resuelta">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 shadow">
        <h6>Rechazadas</h6>
        <h3 id="rechazada">0</h3>
      </div>
    </div>

  </div>

  <!-- 📊 GRÁFICOS -->
  <div class="row">

    <div class="col-md-6">
      <div class="card p-4 shadow">
        <h5 class="text-center">Gráfico de Barras</h5>
        <canvas id="graficoBarras"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-4 shadow">
        <h5 class="text-center">Gráfico Circular</h5>
        <canvas id="graficoPastel"></canvas>
      </div>
    </div>

  </div>

  <!-- 📈 TENDENCIAS -->
  <div class="row mt-4">
    <div class="col-12">
      <div class="card p-4 shadow">
        <h5 class="text-center">Tendencias (Últimos 30 días)</h5>
        <canvas id="graficoTendencias"></canvas>
      </div>
    </div>
  </div>

  <!-- 📤 EXPORTAR -->
  <div class="row mt-4 mb-5">
    <div class="col-12 text-center">
      <button id="exportarPDF" class="btn btn-danger">
        <i class="bi bi-file-earmark-pdf-fill me-2"></i>Exportar reporte PDF
      </button>
    </div>
  </div>

</div>
</main>

<!-- Modal vista previa PDF -->
<div class="modal fade" id="modalPreviaPDF" tabindex="-1" aria-labelledby="modalPreviaPDFLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalPreviaPDFLabel">
          <i class="bi bi-file-earmark-pdf-fill text-danger me-2"></i>Vista previa del reporte
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body p-0">
        <iframe id="iframePreviaPDF" src="" style="width:100%;height:75vh;border:none;"></iframe>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        <button type="button" id="btnConfirmarDescargaPDF" class="btn btn-danger">
          <i class="bi bi-download me-1"></i>Descargar PDF
        </button>
      </div>
    </div>
  </div>
</div>

<script src="js/tema.js"></script>
<script>
  initThemeSelector();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="js/i18n.js"></script>
<script src="js/perfil-menu.js?v=2"></script>
<script type="module" src="js/estadisticas.js"></script>

<!-- Footer -->
<div id="footer-container"></div>

<script type="module" src="./js/footer.js"></script>

</body>
</html>
