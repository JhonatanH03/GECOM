<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GECOM - Panel Principal</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="js/guard.js"></script>
</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Panel Principal</h2>
    <button onclick="logout()" class="btn btn-danger">Cerrar sesión</button>
  </div>

  <div class="row g-4">

    <!-- Registrar denuncia -->
    <div class="col-md-4" id="cardCrearDenuncia" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Registrar Denuncia</h5>
        <button onclick="ir('crear.html')" class="btn btn-primary mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Ver denuncias -->
    <div class="col-md-4">
      <div class="card p-4 shadow text-center">
        <h5>Ver Denuncias</h5>
        <button onclick="ir('ver.html')" class="btn btn-success mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Panel Junta de Vecinos -->
    <div class="col-md-4" id="cardJunta" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Panel Junta</h5>
        <button onclick="ir('junta.html')" class="btn btn-info mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Gestión de Usuarios (solo admin) -->
    <div class="col-md-4" id="cardAdmin" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Estadísticas</h5>
        <button onclick="ir('estadisticas.html')" class="btn btn-warning mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Gestión de Usuarios (solo admin) -->
    <div class="col-md-4" id="cardAdminAyunt" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Gestion de Ayuntamientos</h5>
        <button onclick="ir('ayuntamientos.html')" class="btn btn-warning mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Gestión de Usuarios (solo admin) -->
    <div class="col-md-4" id="cardAdminUsuarios" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Gestión de Usuarios</h5>
        <button onclick="ir('usuarios.html')" class="btn btn-secondary mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Gestión de Juntas (solo ayuntamiento) -->
    <div class="col-md-4" id="cardAyunt" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Gestión de Juntas</h5>
        <button onclick="ir('juntas.html')" class="btn btn-secondary mt-3">
          Ir
        </button>
      </div>
    </div>

    <!-- Registrar Denuncia (solo ayuntamiento) -->
    <div class="col-md-4" id="cardCrearDenunciaAyunt" style="display:none;">
      <div class="card p-4 shadow text-center">
        <h5>Registrar Denuncia</h5>
        <button onclick="ir('crear.html')" class="btn btn-primary mt-3">
          Ir
        </button>
      </div>
    </div>

  </div>

</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
